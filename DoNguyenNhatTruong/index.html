    <script>
        const myComponents = [
            { id: 'header-left-root', file: 'component/header-left.html' },
            { id: 'header-mobile-root', file: 'component/header-mobile.html' },
            { id: 'popup-mobile-root', file: 'component/popup-mobile-menu.html' },
            { id: 'home-root', file: 'component/home.html' },
            { id: 'features-root', file: 'component/features.html' },
            { id: 'portfolio-root', file: 'component/portfolio.html' },
            { id: 'resume-root', file: 'component/resume.html' },
            { id: 'clients-root', file: 'component/clients.html' },
            { id: 'pricing-root', file: 'component/pricing.html' },
            { id: 'blog-root', file: 'component/blog.html' },
            { id: 'contacts-root', file: 'component/contacts.html' },
            { id: 'footer-root', file: 'component/footer.html' },
            { id: 'ready-chat-root', file: 'component/ready-chat.html' },
            { id: 'demo-modal-root', file: 'component/demo-modal-area.html' }
        ];

        async function loadReeniComponents() {
            // Nạp các file HTML tuần tự để bảo toàn thứ tự dựng DOM
            for (const c of myComponents) {
                try {
                    const res = await fetch(c.file);
                    if (!res.ok) throw new Error(`Lỗi nạp file: ${res.status}`);
                    const html = await res.text();
                    
                    const element = document.getElementById(c.id);
                    if (element) {
                        element.outerHTML = html;
                    }
                } catch (e) {
                    console.warn('Không thể load component:', c.file, e);
                }
            }

            // Kích hoạt lại hiệu ứng Background Particle sau khi giao diện đã dựng xong
            if (typeof particlesJS === 'function') {
                initParticlesBg();
            }
        }

        function initParticlesBg() {
            particlesJS('particles-js', {
                "particles": {
                    "number": {
                        "value": 10,
                        "density": {
                            "enable": true,
                            "value_area": 800
                        }
                    },
                    "color": {
                        "value": ["#ff014f"]
                    },
                    "shape": {
                        "type": "edge",
                        "stroke": {
                            "width": 0,
                            "color": "#000000"
                        },
                        "polygon": {
                            "nb_sides": 4
                        },
                        "image": {
                            "src": "img/github.svg",
                            "width": 100,
                            "height": 100
                        }
                    },
                    "opacity": {
                        "value": 0.8,
                        "random": true,
                        "anim": {
                            "enable": false,
                            "speed": 1,
                            "opacity_min": 0.1,
                            "sync": false
                        }
                    },
                    "size": {
                        "value": 4,
                        "random": true,
                        "anim": {
                            "enable": false,
                            "speed": 40,
                            "size_min": 0.1,
                            "sync": false
                        }
                    },
                    "line_linked": {
                        "enable": false,
                        "distance": 150,
                        "color": "#ffffff",
                        "opacity": 0.4,
                        "width": 1
                    },
                    "move": {
                        "enable": true,
                        "speed": 6,
                        "direction": "bounce",
                        "random": false,
                        "straight": false,
                        "out_mode": "out",
                        "attract": {
                            "enable": false,
                            "rotateX": 600,
                            "rotateY": 1200
                        }
                    }
                },
                "interactivity": {
                    "detect_on": "canvas",
                    "events": {
                        "onhover": {
                            "enable": true,
                            "mode": "repulse"
                        },
                        "onclick": {
                            "enable": true,
                            "mode": "push"
                        },
                        "resize": true
                    },
                    "modes": {
                        "grab": {
                            "distance": 400,
                            "line_linked": {
                                "opacity": 1
                            }
                        },
                        "bubble": {
                            "distance": 800,
                            "size": 40,
                            "duration": 2,
                            "opacity": 8,
                            "speed": 3
                        },
                        "repulse": {
                            "distance": 200
                        },
                        "push": {
                            "particles_nb": 4
                        },
                        "remove": {
                            "particles_nb": 2
                        }
                    }
                },
                "retina_detect": true,
                "config_demo": {
                    "hide_card": false,
                    "background_color": "#b61924",
                    "background_image": "",
                    "background_position": "50% 50%",
                    "background_repeat": "no-repeat",
                    "background_size": "cover"
                }
            });
        }

        // Thực thi tải toàn bộ component
        loadReeniComponents();
    </script>
